name: Codex Ingest

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Ingest active element proposals
        id: ingest
        run: node src/core/codex-ingest.js | tee ingest-result.json
      - name: Open PR if additions file changed
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ECOSYSTEM_PAT || secrets.GITHUB_TOKEN }}
          commit-message: 'codex: auto-ingest active element proposals'
          title: 'codex: auto-ingest element proposals'
          body: |
            Auto-generated by `codex-ingest.yml`. Reads `.remembrance/lexicon-proposals.json`,
            filters `kind=element && status=active`, writes `src/atomic/periodic-table-additions.js`.

            Merging this PR grows the Codex across repo boundaries — previously the table only
            grew via the local post-commit hook on a dev machine.
          branch: 'codex-ingest/auto'
          delete-branch: true
          labels: 'codex,automated,auto-mergeable'
