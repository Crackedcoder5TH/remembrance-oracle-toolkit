name: Covenant Fractal Check

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  fractal:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          fi

      - name: Run fractal covenant tests
        run: node --test --test-timeout=60000 tests/covenant-fractal.test.js

      - name: Run fractal audit across diff files
        id: audit
        run: |
          node -e "
          const { fractalAudit } = require('./src/core/covenant-fractal');
          const fs = require('fs');
          const { execSync } = require('child_process');
          let files = [];
          try {
            files = execSync('git diff HEAD~1 HEAD --name-only', { encoding: 'utf-8' })
              .split('\n').filter(f => /\.(js|jsx|ts|tsx)$/.test(f));
          } catch { files = []; }
          let unhealthy = 0;
          const reports = [];
          for (const f of files) {
            if (!fs.existsSync(f)) continue;
            const code = fs.readFileSync(f, 'utf-8');
            const r = fractalAudit({ code, filePath: f });
            const byteFindings = (r.byteScale || []).length;
            if (!r.fractalHealth) {
              unhealthy++;
              console.log('::warning file=' + f + '::fractal covenant breach - ' + byteFindings + ' ungated mutations');
              reports.push({ file: f, byteFindings, fileSig: r.fileSignature.combined });
            }
          }
          fs.writeFileSync('fractal-report.json', JSON.stringify({ scanned: files.length, unhealthy, reports }, null, 2));
          if (unhealthy > 0) { console.log('::error::' + unhealthy + ' files failed fractal audit'); process.exit(1); }
          console.log('fractal audit: ' + files.length + ' files scanned, all healthy');
          "

      - name: Upload fractal report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fractal-report
          path: fractal-report.json
          if-no-files-found: ignore

      - name: Comment on PR with fractal findings
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('fractal-report.json')) return;
            const report = JSON.parse(fs.readFileSync('fractal-report.json', 'utf-8'));
            if (report.unhealthy === 0) return;
            const body = [
              '## Covenant Fractal Check — FAILED',
              '',
              `${report.unhealthy} of ${report.scanned} changed files failed fractal audit.`,
              '',
              ...report.reports.slice(0, 10).map(r => `- \`${r.file}\` — ${r.byteFindings} ungated mutation(s)`),
              '',
              'Fix: wrap mutations through a covenant gate. See `src/core/covenant-fractal.js`.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
