name: Covenant Self-Heal

on:
  workflow_run:
    workflows: ['Covenant + Lexicon Watcher']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    if: github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Expire stale proposals
        run: node src/core/proposal-expiry.js
      - name: Remediate recently-failing files
        id: remediate
        run: |
          FILES=$(git diff HEAD~3 HEAD --name-only | grep -E '\.(js|jsx|ts|tsx)$' || true)
          if [ -z "$FILES" ]; then echo 'no files to remediate'; exit 0; fi
          node src/core/covenant-remediator.js $FILES | tee remediation.json
      - name: Open PR if changes were made
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ECOSYSTEM_PAT || secrets.GITHUB_TOKEN }}
          commit-message: 'covenant: auto-heal remediations'
          title: 'covenant: auto-heal (framing + stale proposals)'
          body: |
            Auto-generated by covenant-self-heal.yml.

            - Expired stale lexicon proposals (>7d pending)
            - Injected disclaimer headers for framing-check breaches

            Safe to merge if all checks pass; auto-mergeable for bot-author commits.
          branch: 'covenant/self-heal-auto'
          delete-branch: true
          labels: 'covenant,automated,auto-mergeable'
