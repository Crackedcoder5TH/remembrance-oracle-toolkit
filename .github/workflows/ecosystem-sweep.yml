name: Ecosystem Sweep

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
          fi

      - name: Run sweep
        id: sweep
        env:
          ECOSYSTEM_PAT: ${{ secrets.ECOSYSTEM_PAT || secrets.GITHUB_TOKEN }}
          ECOSYSTEM_OWNER: ${{ github.repository_owner }}
        run: |
          node src/core/ecosystem-sweep.js > sweep-report.md 2>&1 || echo 'sweep had errors, see report'
          cat sweep-report.md

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-sweep-report
          path: sweep-report.md
          if-no-files-found: ignore

      - name: Create or update ecosystem-state issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('sweep-report.md')) return;
            const body = fs.readFileSync('sweep-report.md', 'utf-8');
            const date = new Date().toISOString().slice(0, 10);
            const title = `Ecosystem Sweep ${date}`;
            // check if today's issue already exists
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "Ecosystem Sweep ${date}"`,
            });
            if (existing.data.items.length > 0) {
              const issue = existing.data.items[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              console.log(`updated issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ecosystem-sweep', 'automated'],
              });
              console.log(`created issue #${created.data.number}`);
            }
