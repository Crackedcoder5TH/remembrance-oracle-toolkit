name: 'Remembrance Oracle'
description: 'AI code memory — validate, query, search, and manage proven code patterns in CI/CD pipelines'
author: 'Crackedcoder5TH'

branding:
  icon: 'database'
  color: 'purple'

inputs:
  command:
    description: 'Command to run: submit, query, search, resolve, validate, stats, patterns, feedback, inspect, prune, harvest, maintain, auto-submit, covenant, security-scan'
    required: true
    default: 'stats'
  file:
    description: 'Path to code file (for submit/validate/covenant/security-scan)'
    required: false
  test-file:
    description: 'Path to test file (for submit/validate)'
    required: false
  description:
    description: 'Description (for submit/query/search/resolve)'
    required: false
  tags:
    description: 'Comma-separated tags (for submit/query)'
    required: false
  language:
    description: 'Language filter (javascript, python, typescript, rust, go)'
    required: false
  entry-id:
    description: 'Entry ID (for feedback/inspect)'
    required: false
  success:
    description: 'Whether the code worked (for feedback)'
    required: false
  min-coherency:
    description: 'Minimum coherency score (0-1)'
    required: false
    default: '0.5'
  limit:
    description: 'Max results (for query/search)'
    required: false
    default: '5'
  path:
    description: 'Directory path (for harvest)'
    required: false
    default: '.'
  args:
    description: 'Additional CLI arguments (passed through to the command)'
    required: false

outputs:
  result:
    description: 'Command output as JSON'
  accepted:
    description: 'Whether submitted code was accepted (submit only)'
  coherency-score:
    description: 'Coherency score of submitted/validated code'
  decision:
    description: 'PULL/EVOLVE/GENERATE decision (resolve only)'
  sealed:
    description: 'Whether covenant is sealed (covenant only)'

runs:
  using: 'node20'
  main: 'src/action.js'
